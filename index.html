<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Met Astro World Scrollytelling Prototype</title>
  <style>
    :root {
      --bg: #08111f;
      --panel: rgba(8, 17, 31, 0.82);
      --panel-strong: rgba(9, 20, 38, 0.94);
      --text: #e9eef8;
      --muted: #9cadc6;
      --accent: #7fd6ff;
      --accent-2: #b68cff;
      --accent-3: #ffd27f;
      --grid: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.12);
      --good: #79e2b0;
      --warn: #ffb56b;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(127, 214, 255, 0.16), transparent 26%),
        radial-gradient(circle at 80% 15%, rgba(182, 140, 255, 0.16), transparent 22%),
        radial-gradient(circle at 50% 85%, rgba(255, 210, 127, 0.1), transparent 28%),
        linear-gradient(180deg, #060d18 0%, #08111f 45%, #0d1930 100%);
      min-height: 100vh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.45;
      background-image:
        radial-gradient(2px 2px at 12% 20%, rgba(255,255,255,0.8), transparent 50%),
        radial-gradient(1.5px 1.5px at 66% 18%, rgba(255,255,255,0.75), transparent 50%),
        radial-gradient(2px 2px at 84% 34%, rgba(255,255,255,0.7), transparent 50%),
        radial-gradient(1.5px 1.5px at 44% 72%, rgba(255,255,255,0.7), transparent 50%),
        radial-gradient(2px 2px at 22% 82%, rgba(255,255,255,0.75), transparent 50%);
    }

    a {
      color: var(--accent);
    }

    .page {
      display: grid;
      grid-template-columns: minmax(320px, 0.95fr) minmax(360px, 1.05fr);
      gap: 24px;
      max-width: 1480px;
      margin: 0 auto;
      padding: 24px;
    }

    .story {
      padding-bottom: 25vh;
    }

    .hero,
    .step,
    .closing {
      min-height: 90vh;
      display: flex;
      align-items: center;
    }

    .copy-card {
      width: min(100%, 680px);
      padding: 28px;
      border-radius: 24px;
      background: var(--panel);
      border: 1px solid var(--border);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 10px;
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      font-size: clamp(2.5rem, 5vw, 4.75rem);
      line-height: 0.95;
      margin-bottom: 18px;
    }

    h2 {
      font-size: clamp(1.65rem, 2vw, 2.4rem);
      margin-bottom: 14px;
    }

    p,
    li {
      color: var(--muted);
      line-height: 1.7;
      font-size: 1rem;
    }

    .lede {
      font-size: 1.08rem;
      color: var(--text);
      max-width: 58ch;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .metric {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.03);
    }

    .metric strong {
      display: block;
      font-size: 1.5rem;
      color: var(--text);
    }

    .metric span {
      display: block;
      margin-top: 6px;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .insight-list {
      padding-left: 18px;
      margin: 16px 0 0;
    }

    .sticky-panel {
      position: sticky;
      top: 24px;
      height: calc(100vh - 48px);
      border-radius: 28px;
      padding: 22px;
      background: var(--panel-strong);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .viz-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .viz-header p {
      margin-bottom: 0;
      max-width: 42ch;
      font-size: 0.92rem;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .legend-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
      font-size: 0.8rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .swatch {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      display: inline-block;
    }

    #viz {
      width: 100%;
      flex: 1;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)),
        rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .tooltip {
      position: absolute;
      pointer-events: none;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(8, 17, 31, 0.95);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.85rem;
      line-height: 1.45;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 120ms ease, transform 120ms ease;
      max-width: 260px;
      z-index: 4;
    }

    .tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .loading {
      display: grid;
      place-items: center;
      min-height: 100vh;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.9rem;
    }

    .footer-note {
      margin-top: 18px;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }

    .cta {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      text-decoration: none;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
    }

    @media (max-width: 1100px) {
      .page {
        grid-template-columns: 1fr;
      }

      .sticky-panel {
        position: relative;
        top: auto;
        height: 72vh;
        min-height: 540px;
        order: -1;
      }

      .hero,
      .step,
      .closing {
        min-height: auto;
        padding: 40px 0;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 14px;
      }

      .copy-card,
      .sticky-panel {
        padding: 18px;
        border-radius: 20px;
      }

      h1 {
        font-size: 2.35rem;
      }
    }
  </style>
</head>
<body>
  <div id="app" class="loading">Loading scrollytelling prototype...</div>
  <script>
    const app = document.getElementById("app");

    const HISTORY_ANCHORS = [
      { year: 1789, label: "French Revolution", color: "#ffd27f" },
      { year: 1800, label: "Industrial Revolution midpoint", color: "#7fd6ff" },
      { year: 1914, label: "World War I", color: "#f08ad2" },
      { year: 1939, label: "World War II", color: "#ff8f70" },
      { year: 1960, label: "Post-colonial independence wave", color: "#79e2b0" }
    ];

    const TRANSIT_GROUPS = [
      {
        key: "jupiterSaturn",
        label: "Jupiter-Saturn cycle",
        color: "#b68cff",
        years: [1723, 1743, 1763, 1782, 1802, 1821, 1842, 1861, 1881, 1901, 1921, 1940, 1961, 1980, 2000, 2020]
      },
      {
        key: "saturnAries",
        label: "Saturn in Aries",
        color: "#7fd6ff",
        years: [1758, 1787, 1817, 1846, 1876, 1905, 1935, 1964, 1996]
      },
      {
        key: "uranusAries",
        label: "Uranus in Aries",
        color: "#ffd27f",
        years: [1767, 1851, 1927, 2011]
      }
    ];

    fetch("ObjectsvsHistory.csv")
      .then((response) => response.text())
      .then((csvText) => {
        const records = parseCSV(csvText);
        const analytics = computeAnalytics(records);
        renderPage(records, analytics);
      })
      .catch((error) => {
        console.error(error);
        app.className = "loading";
        app.textContent = "Unable to load ObjectsvsHistory.csv. Run a local server to view the prototype.";
      });

    function renderPage(records, analytics) {
      app.className = "";
      app.innerHTML = `
        <main class="page">
          <section class="story">
            <article class="hero" data-step="intro">
              <div class="copy-card">
                <span class="eyebrow">Met Astro World</span>
                <h1>From Earthly Objects to Celestial Time</h1>
                <p class="lede">
                  A first-pass scrollytelling prototype built from the storyline blueprint in this repo. It follows
                  ${analytics.totalRows} highlighted Met object-history pairings across ${analytics.objectRange.span} years of creation time,
                  tracing how museum objects cluster around historical change and symbolic sky cycles.
                </p>
                <div class="metric-grid">
                  <div class="metric"><strong>${analytics.totalRows}</strong><span>Rows in the working sample</span></div>
                  <div class="metric"><strong>${analytics.objectRange.min}-${analytics.objectRange.max}</strong><span>Object creation span</span></div>
                  <div class="metric"><strong>${analytics.objectRange.span}</strong><span>Years of cultural production</span></div>
                </div>
                <p class="footer-note">
                  Scroll to move through the six-section story. The panel on the right updates as each chapter becomes active.
                </p>
              </div>
            </article>

            <article class="step" data-step="patterns">
              <div class="copy-card">
                <span class="eyebrow">01 / Temporal clustering</span>
                <h2>These objects are not evenly distributed in time.</h2>
                <p>
                  The sample is pulled strongly toward the 18th century, then redistributes into 19th and 20th century clusters.
                  About <strong>${formatPercent(analytics.pre1900Share)}</strong> of all records were created between 1700 and 1899.
                </p>
                <ul class="insight-list">
                  <li>18th century: <strong>${analytics.centuries["18th"]}</strong> objects</li>
                  <li>19th century: <strong>${analytics.centuries["19th"]}</strong> objects</li>
                  <li>20th century: <strong>${analytics.centuries["20th"]}</strong> objects</li>
                  <li>21st century: <strong>${analytics.centuries["21st"]}</strong> objects</li>
                </ul>
              </div>
            </article>

            <article class="step" data-step="geography">
              <div class="copy-card">
                <span class="eyebrow">02 / Geographic concentration</span>
                <h2>A global dataset with a narrow center of gravity.</h2>
                <p>
                  The records span <strong>${analytics.countryCount}</strong> countries, but the top five account for
                  <strong>${formatPercent(analytics.topFiveShare)}</strong> of the full sample. Paris alone appears as a dominant city.
                </p>
                <ul class="insight-list">
                  ${analytics.topCountries.slice(0, 5).map((d, index) => `<li>${index + 1}. <strong>${escapeHTML(d.label)}</strong>: ${d.count} objects</li>`).join("")}
                </ul>
              </div>
            </article>

            <article class="step" data-step="history">
              <div class="copy-card">
                <span class="eyebrow">03 / Objects beside incidents</span>
                <h2>Object dates sit unusually close to historical event dates.</h2>
                <p>
                  Because the dataset was curated as object-incident pairs, the strongest insight is proximity:
                  the median gap between object year and incident year is <strong>${analytics.gapMetrics.medianGap}</strong> years.
                </p>
                <div class="metric-grid">
                  <div class="metric"><strong>${formatPercent(analytics.gapMetrics.within1)}</strong><span>Within ±1 year</span></div>
                  <div class="metric"><strong>${formatPercent(analytics.gapMetrics.within5)}</strong><span>Within ±5 years</span></div>
                  <div class="metric"><strong>${formatPercent(analytics.gapMetrics.within25)}</strong><span>Within ±25 years</span></div>
                </div>
              </div>
            </article>

            <article class="step" data-step="transits">
              <div class="copy-card">
                <span class="eyebrow">04 / Symbolic transit layer</span>
                <h2>A symbolic comparison, not a causal claim.</h2>
                <p>
                  This layer asks whether object creation clusters overlap with broad collective-cycle transit windows.
                  The strongest overlap in this sample is around Jupiter-Saturn conjunction years, where
                  <strong>${formatPercent(analytics.transitMetrics.jupiterSaturn.plusMinus5)}</strong> of objects fall within ±5 years.
                </p>
                <ul class="insight-list">
                  <li>Jupiter-Saturn ±3 years: <strong>${formatPercent(analytics.transitMetrics.jupiterSaturn.plusMinus3)}</strong></li>
                  <li>Saturn in Aries ±5 years: <strong>${formatPercent(analytics.transitMetrics.saturnAries.plusMinus5)}</strong></li>
                  <li>Uranus in Aries ±3 years: <strong>${formatPercent(analytics.transitMetrics.uranusAries.plusMinus3)}</strong></li>
                </ul>
              </div>
            </article>

            <article class="closing" data-step="takeaways">
              <div class="copy-card">
                <span class="eyebrow">05 / Where to go next</span>
                <h2>Three clocks, one narrative frame.</h2>
                <p>
                  The strongest first-pass takeaways are temporal clustering, spatial concentration, and tight
                  history alignment. This prototype is intentionally lightweight so the next iteration can focus on
                  richer media, image integration, and more refined interaction design.
                </p>
                <div class="metric-grid">
                  <div class="metric"><strong>${analytics.centuries["18th"]}</strong><span>Largest century cluster</span></div>
                  <div class="metric"><strong>${formatPercent(analytics.topFiveShare)}</strong><span>Top-five country share</span></div>
                  <div class="metric"><strong>${formatPercent(analytics.gapMetrics.within25)}</strong><span>Pairs within ±25 years</span></div>
                </div>
                <div class="cta-row">
                  <a class="cta" href="https://www.metmuseum.org/en/hubs/open-access" target="_blank" rel="noreferrer">Met Open Access</a>
                  <a class="cta" href="https://ssd.jpl.nasa.gov/horizons/" target="_blank" rel="noreferrer">NASA JPL Horizons</a>
                </div>
              </div>
            </article>
          </section>

          <aside class="sticky-panel">
            <div class="viz-header">
              <div>
                <span class="eyebrow" id="viz-kicker">Overview</span>
                <h3 id="viz-title">Dataset overview</h3>
              </div>
              <p id="viz-description">The visual panel shifts with each step, using the same in-browser metrics and CSV rows.</p>
            </div>
            <div class="legend" id="legend"></div>
            <svg id="viz" viewBox="0 0 860 820" preserveAspectRatio="xMidYMid meet"></svg>
            <div class="footer-note" id="viz-footnote"></div>
          </aside>
        </main>
        <div class="tooltip" id="tooltip"></div>
      `;

      setupScrollytelling(records, analytics);
    }

    function setupScrollytelling(records, analytics) {
      const svg = document.getElementById("viz");
      const tooltip = document.getElementById("tooltip");
      const legend = document.getElementById("legend");
      const title = document.getElementById("viz-title");
      const kicker = document.getElementById("viz-kicker");
      const description = document.getElementById("viz-description");
      const footnote = document.getElementById("viz-footnote");

      const renders = {
        intro: () => renderIntro(svg, analytics, { title, kicker, description, footnote, legend, tooltip }),
        patterns: () => renderPatterns(svg, analytics, { title, kicker, description, footnote, legend, tooltip }),
        geography: () => renderGeography(svg, analytics, { title, kicker, description, footnote, legend, tooltip }),
        history: () => renderHistory(svg, records, analytics, { title, kicker, description, footnote, legend, tooltip }),
        transits: () => renderTransits(svg, records, analytics, { title, kicker, description, footnote, legend, tooltip }),
        takeaways: () => renderTakeaways(svg, analytics, { title, kicker, description, footnote, legend, tooltip })
      };

      const steps = Array.from(document.querySelectorAll("[data-step]"));
      let currentStep = "";

      const observer = new IntersectionObserver((entries) => {
        const visible = entries
          .filter((entry) => entry.isIntersecting)
          .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
        if (!visible) return;
        const step = visible.target.dataset.step;
        if (step !== currentStep) {
          currentStep = step;
          renders[step]();
        }
      }, { threshold: [0.4, 0.6, 0.8] });

      steps.forEach((step) => observer.observe(step));
      renders.intro();

      window.addEventListener("mousemove", (event) => {
        tooltip.style.left = `${event.clientX + 18}px`;
        tooltip.style.top = `${event.clientY + 18}px`;
      });
    }

    function renderIntro(svg, analytics, ui) {
      updateHeader(ui, {
        kicker: "Overview",
        title: "Timeline of object creation years",
        description: "Each dot is one row from the CSV, positioned from the earliest to latest object creation year.",
        footnote: "The opening state emphasizes span and density before the story narrows into patterns, places, and alignments."
      });
      setLegend(ui.legend, [
        { color: "#7fd6ff", label: "Object row" },
        { color: "#b68cff", label: "Timeline axis" }
      ]);

      const width = 860;
      const height = 820;
      clearSVG(svg);

      const years = analytics.objectYears;
      const margin = { top: 120, right: 60, bottom: 100, left: 60 };
      const axisY = height / 2;
      const x = scaleLinear(analytics.objectRange.min, analytics.objectRange.max, margin.left, width - margin.right);

      appendLine(svg, margin.left, axisY, width - margin.right, axisY, "#b68cff", 2, 0.5);
      [analytics.objectRange.min, 1800, 1900, analytics.objectRange.max].forEach((year) => {
        const px = x(year);
        appendLine(svg, px, axisY - 18, px, axisY + 18, "rgba(255,255,255,0.45)", 1, 1);
        appendText(svg, px, axisY + 42, String(year), "middle", "#9cadc6", 14, 500);
      });

      years.forEach((year, index) => {
        const jitter = ((index % 11) - 5) * 9;
        const circle = appendCircle(svg, x(year), axisY + jitter, 4.2, "#7fd6ff", 0.82);
        circle.addEventListener("mouseenter", () => showTooltip(ui.tooltip, `${year}`));
        circle.addEventListener("mouseleave", () => hideTooltip(ui.tooltip));
      });

      appendText(svg, width / 2, 74, "321 years of object creation in the sample", "middle", "#e9eef8", 28, 700);
      appendText(svg, width / 2, 104, "From 1701 to 2022", "middle", "#9cadc6", 16, 500);
    }

    function renderPatterns(svg, analytics, ui) {
      updateHeader(ui, {
        kicker: "Temporal clustering",
        title: "Density by creation year",
        description: "A smoothed histogram shows how heavily the dataset concentrates in the 18th century, then builds new clusters in the 19th and 20th.",
        footnote: `Peak decade in this sample: ${analytics.topDecades[0].label} with ${analytics.topDecades[0].count} records.`
      });
      setLegend(ui.legend, [
        { color: "#7fd6ff", label: "Year density" },
        { color: "#ffd27f", label: "Annotated decade peak" }
      ]);

      clearSVG(svg);
      const width = 860;
      const height = 820;
      const margin = { top: 90, right: 36, bottom: 90, left: 56 };
      const bins = analytics.yearBins;
      const x = scaleLinear(analytics.objectRange.min, analytics.objectRange.max, margin.left, width - margin.right);
      const y = scaleLinear(0, Math.max(...bins.map((bin) => bin.count)) || 1, height - margin.bottom, margin.top);

      for (let year = 1720; year <= 2020; year += 40) {
        const px = x(year);
        appendLine(svg, px, margin.top, px, height - margin.bottom, "rgba(255,255,255,0.06)", 1, 1);
        appendText(svg, px, height - margin.bottom + 30, String(year), "middle", "#91a0b8", 13, 500);
      }

      appendLine(svg, margin.left, height - margin.bottom, width - margin.right, height - margin.bottom, "rgba(255,255,255,0.4)", 1.2, 1);
      appendLine(svg, margin.left, margin.top, margin.left, height - margin.bottom, "rgba(255,255,255,0.4)", 1.2, 1);

      const path = bins.map((bin, index) => `${index === 0 ? "M" : "L"} ${x(bin.year)} ${y(bin.count)}`).join(" ");
      const fillPath = `${path} L ${x(bins[bins.length - 1].year)} ${height - margin.bottom} L ${x(bins[0].year)} ${height - margin.bottom} Z`;
      appendPath(svg, fillPath, "rgba(127, 214, 255, 0.18)", "none", 0);
      appendPath(svg, path, "none", "#7fd6ff", 4, 0.95);

      analytics.topDecades.slice(0, 3).forEach((decade) => {
        const px = x(decade.year);
        const py = y(decade.count);
        appendCircle(svg, px, py, 7, "#ffd27f", 1);
        appendText(svg, px, py - 18, `${decade.label} • ${decade.count}`, "middle", "#ffd27f", 13, 700);
      });

      appendText(svg, margin.left, margin.top - 24, "Objects created", "start", "#9cadc6", 14, 600);
    }

    function renderGeography(svg, analytics, ui) {
      updateHeader(ui, {
        kicker: "Geographic concentration",
        title: "Top countries in the sample",
        description: "Bubble size reflects how much of the CSV is concentrated in a small set of countries, with Paris standing out as a city hotspot.",
        footnote: `Paris appears in ${analytics.cityMetrics.parisCount} rows; unknown city metadata appears in ${analytics.cityMetrics.unknownCount}.`
      });
      setLegend(ui.legend, [
        { color: "#79e2b0", label: "Country share" },
        { color: "#ffb56b", label: "Top 5 countries" }
      ]);

      clearSVG(svg);
      const width = 860;
      const height = 820;
      const countries = analytics.topCountries.slice(0, 10);
      const centerX = width / 2;
      const centerY = height / 2 + 30;
      const layout = [
        [0, -165], [-195, -70], [190, -70], [-225, 135], [220, 145],
        [0, 190], [-80, 42], [85, 40], [-285, 20], [295, 18]
      ];

      countries.forEach((country, index) => {
        const [dx, dy] = layout[index] || [0, 0];
        const r = 18 + (country.count / countries[0].count) * 92;
        const isTopFive = index < 5;
        const circle = appendCircle(svg, centerX + dx, centerY + dy, r, isTopFive ? "#ffb56b" : "#79e2b0", 0.78);
        circle.setAttribute("stroke", "rgba(255,255,255,0.16)");
        circle.setAttribute("stroke-width", "1");
        circle.addEventListener("mouseenter", () => {
          showTooltip(ui.tooltip, `${escapeHTML(country.label)}<br>${country.count} rows<br>${formatPercent(country.share)} of sample`);
        });
        circle.addEventListener("mouseleave", () => hideTooltip(ui.tooltip));
        appendText(svg, centerX + dx, centerY + dy - 6, country.label, "middle", "#08111f", 14, 700);
        appendText(svg, centerX + dx, centerY + dy + 14, `${country.count}`, "middle", "#08111f", 13, 600);
      });

      appendText(svg, width / 2, 80, `${formatPercent(analytics.topFiveShare)} of all rows come from just five countries`, "middle", "#e9eef8", 26, 700);
      appendText(svg, width / 2, 110, "A global dataset with a very concentrated center", "middle", "#9cadc6", 15, 500);
    }

    function renderHistory(svg, records, analytics, ui) {
      updateHeader(ui, {
        kicker: "Object vs event years",
        title: "Two-lane history alignment view",
        description: "Each connection line links a single object creation year to its paired incident year, revealing how often these dates land in the same era.",
        footnote: `${analytics.gapMetrics.validPairs} rows contain both object and event years; ${formatPercent(analytics.gapMetrics.within25)} land within ±25 years.`
      });
      setLegend(ui.legend, [
        { color: "#7fd6ff", label: "Object year" },
        { color: "#ffd27f", label: "Incident year" },
        { color: "#f08ad2", label: "World-history anchor" }
      ]);

      clearSVG(svg);
      const width = 860;
      const height = 820;
      const margin = { top: 120, right: 46, bottom: 100, left: 46 };
      const topLane = 270;
      const bottomLane = 560;
      const x = scaleLinear(analytics.objectRange.min, analytics.incidentRange.max, margin.left, width - margin.right);

      appendLine(svg, margin.left, topLane, width - margin.right, topLane, "rgba(127,214,255,0.75)", 2, 1);
      appendLine(svg, margin.left, bottomLane, width - margin.right, bottomLane, "rgba(255,210,127,0.75)", 2, 1);
      appendText(svg, margin.left, topLane - 24, "Object year", "start", "#7fd6ff", 15, 700);
      appendText(svg, margin.left, bottomLane - 24, "Incident year", "start", "#ffd27f", 15, 700);

      HISTORY_ANCHORS.forEach((anchor) => {
        const px = x(anchor.year);
        appendLine(svg, px, margin.top, px, height - margin.bottom, anchor.color, 1.2, 0.28);
        appendText(svg, px, margin.top - 18, anchor.label, "middle", anchor.color, 12, 600, -30);
      });

      analytics.validPairs.slice(0, 160).forEach((pair, index) => {
        const objectX = x(pair.objectYear);
        const eventX = x(pair.eventYear);
        const path = `M ${objectX} ${topLane} C ${objectX} ${(topLane + bottomLane) / 2}, ${eventX} ${(topLane + bottomLane) / 2}, ${eventX} ${bottomLane}`;
        const stroke = Math.abs(pair.gap) <= 1 ? "#79e2b0" : "rgba(255,255,255,0.12)";
        const line = appendPath(svg, path, "none", stroke, 1.2, 0.42);
        const objectDot = appendCircle(svg, objectX, topLane + ((index % 7) - 3) * 6, 3.5, "#7fd6ff", 0.86);
        const eventDot = appendCircle(svg, eventX, bottomLane + ((index % 7) - 3) * 6, 3.5, "#ffd27f", 0.86);
        [line, objectDot, eventDot].forEach((node) => {
          node.addEventListener("mouseenter", () => {
            showTooltip(ui.tooltip, `<strong>${escapeHTML(pair.title || pair.objectName || "Untitled object")}</strong><br>Object year: ${pair.objectYear}<br>Incident year: ${pair.eventYear}<br>Gap: ${pair.gap} years`);
          });
          node.addEventListener("mouseleave", () => hideTooltip(ui.tooltip));
        });
      });

      [1701, 1789, 1800, 1900, 1939, 2022].forEach((year) => {
        const px = x(year);
        appendText(svg, px, height - margin.bottom + 34, String(year), "middle", "#9cadc6", 13, 500);
      });
    }

    function renderTransits(svg, records, analytics, ui) {
      updateHeader(ui, {
        kicker: "Symbolic sky layer",
        title: "Objects and transit milestone windows",
        description: "Transit markers are shown on the top lane while object creation years remain on the bottom, preserving a shared temporal axis.",
        footnote: "These year-window matches are exploratory and should be replaced with precise ephemeris calculations in later iterations."
      });
      setLegend(ui.legend, [
        { color: "#7fd6ff", label: "Object year" },
        { color: "#b68cff", label: "Jupiter-Saturn" },
        { color: "#7fd6ff", label: "Saturn in Aries" },
        { color: "#ffd27f", label: "Uranus in Aries" }
      ]);

      clearSVG(svg);
      const width = 860;
      const height = 820;
      const margin = { top: 120, right: 40, bottom: 100, left: 50 };
      const transitLane = 250;
      const objectLane = 565;
      const x = scaleLinear(analytics.objectRange.min, analytics.objectRange.max, margin.left, width - margin.right);

      appendLine(svg, margin.left, transitLane, width - margin.right, transitLane, "rgba(255,255,255,0.35)", 1.5, 1);
      appendLine(svg, margin.left, objectLane, width - margin.right, objectLane, "rgba(127,214,255,0.7)", 2, 1);
      appendText(svg, margin.left, transitLane - 24, "Transit milestones", "start", "#e9eef8", 15, 700);
      appendText(svg, margin.left, objectLane - 24, "Object creation years", "start", "#7fd6ff", 15, 700);

      TRANSIT_GROUPS.forEach((group, groupIndex) => {
        group.years.forEach((year, index) => {
          const px = x(year);
          const y = transitLane - 48 + groupIndex * 48;
          appendLine(svg, px, y + 10, px, objectLane, group.color, 0.8, 0.12);
          const dot = appendCircle(svg, px, y, 6.2, group.color, 0.95);
          dot.addEventListener("mouseenter", () => showTooltip(ui.tooltip, `${group.label}<br>${year}`));
          dot.addEventListener("mouseleave", () => hideTooltip(ui.tooltip));
          if (index < 5 || index === group.years.length - 1) {
            appendText(svg, px, y - 16, String(year), "middle", group.color, 11, 600);
          }
        });
      });

      analytics.objectYears.forEach((year, index) => {
        const jitter = ((index % 15) - 7) * 6;
        const dot = appendCircle(svg, x(year), objectLane + jitter, 3.8, "#7fd6ff", 0.7);
        dot.addEventListener("mouseenter", () => showTooltip(ui.tooltip, `Object year ${year}`));
        dot.addEventListener("mouseleave", () => hideTooltip(ui.tooltip));
      });

      const cards = [
        ["Jupiter-Saturn ±5", formatPercent(analytics.transitMetrics.jupiterSaturn.plusMinus5)],
        ["Saturn in Aries ±5", formatPercent(analytics.transitMetrics.saturnAries.plusMinus5)],
        ["Uranus in Aries ±3", formatPercent(analytics.transitMetrics.uranusAries.plusMinus3)]
      ];
      cards.forEach((card, index) => {
        appendRect(svg, 64 + index * 240, 654, 190, 92, "rgba(255,255,255,0.045)", "rgba(255,255,255,0.08)");
        appendText(svg, 84 + index * 240, 690, card[0], "start", "#9cadc6", 13, 600);
        appendText(svg, 84 + index * 240, 722, card[1], "start", "#e9eef8", 28, 700);
      });
    }

    function renderTakeaways(svg, analytics, ui) {
      updateHeader(ui, {
        kicker: "Takeaways",
        title: "Three strongest signals in the current prototype",
        description: "This wraps the storyline into three quantitative cards that can later evolve into clickable gateways for deeper exploration.",
        footnote: "Next useful additions: a data-quality panel, normalized place names, and image-rich object detail states."
      });
      setLegend(ui.legend, [
        { color: "#7fd6ff", label: "Time" },
        { color: "#ffb56b", label: "Place" },
        { color: "#79e2b0", label: "History alignment" }
      ]);

      clearSVG(svg);
      const cards = [
        {
          x: 70,
          y: 160,
          w: 220,
          h: 420,
          color: "#7fd6ff",
          label: "Temporal concentration",
          value: `${analytics.centuries["18th"]}`,
          detail: "Objects in the 18th century cluster"
        },
        {
          x: 320,
          y: 130,
          w: 220,
          h: 450,
          color: "#ffb56b",
          label: "Spatial concentration",
          value: formatPercent(analytics.topFiveShare),
          detail: "Rows from the top five countries"
        },
        {
          x: 570,
          y: 100,
          w: 220,
          h: 480,
          color: "#79e2b0",
          label: "History alignment",
          value: formatPercent(analytics.gapMetrics.within25),
          detail: "Pairs within ±25 years"
        }
      ];

      cards.forEach((card) => {
        appendRect(svg, card.x, card.y, card.w, card.h, `${card.color}22`, `${card.color}66`, 24);
        appendText(svg, card.x + 24, card.y + 56, card.label, "start", "#e9eef8", 18, 700);
        appendText(svg, card.x + 24, card.y + 130, card.value, "start", card.color, 46, 800);
        appendText(svg, card.x + 24, card.y + 168, card.detail, "start", "#9cadc6", 14, 500);
        const spark = analytics.yearBins.slice(card.x < 200 ? 0 : card.x < 400 ? 12 : 24, card.x < 200 ? 18 : card.x < 400 ? 30 : 42);
        const max = Math.max(...spark.map((d) => d.count), 1);
        spark.forEach((point, index) => {
          const barH = (point.count / max) * 110;
          appendRect(svg, card.x + 24 + index * 10, card.y + card.h - 36 - barH, 7, barH, `${card.color}aa`, "none", 4);
        });
      });

      appendText(svg, 430, 700, "Prototype next steps", "middle", "#e9eef8", 26, 700);
      appendText(svg, 430, 736, "Add media, object-image cards, and deeper filtering by event type or geography.", "middle", "#9cadc6", 16, 500);
    }

    function computeAnalytics(records) {
      const objectYears = records.map((row) => row.objectYear).filter(isFiniteNumber).sort((a, b) => a - b);
      const incidentYears = records.map((row) => row.eventYear).filter(isFiniteNumber).sort((a, b) => a - b);
      const objectRange = {
        min: Math.min(...objectYears),
        max: Math.max(...objectYears),
        span: Math.max(...objectYears) - Math.min(...objectYears) + 1
      };
      const incidentRange = {
        min: Math.min(...incidentYears),
        max: Math.max(...incidentYears)
      };

      const centuries = {
        "18th": countWhere(objectYears, (year) => year >= 1700 && year <= 1799),
        "19th": countWhere(objectYears, (year) => year >= 1800 && year <= 1899),
        "20th": countWhere(objectYears, (year) => year >= 1900 && year <= 1999),
        "21st": countWhere(objectYears, (year) => year >= 2000 && year <= 2099)
      };

      const pre1900Share = countWhere(objectYears, (year) => year < 1900) / records.length;
      const countryMap = tally(records.map((row) => cleanLabel(row.country) || "Unknown"));
      const cityMap = tally(records.map((row) => cleanLabel(row.city) || "Unknown city"));
      const topCountries = mapToSortedArray(countryMap, records.length);
      const topFiveShare = topCountries.slice(0, 5).reduce((sum, entry) => sum + entry.count, 0) / records.length;
      const countryCount = topCountries.length;

      const decadeMap = tally(objectYears.map((year) => Math.floor(year / 10) * 10));
      const topDecades = mapToSortedArray(decadeMap, records.length)
        .map((entry) => ({ ...entry, year: Number(entry.label), label: `${entry.label}s` }))
        .slice(0, 6);

      const yearBins = [];
      for (let year = objectRange.min; year <= objectRange.max; year += 5) {
        const count = countWhere(objectYears, (objectYear) => objectYear >= year && objectYear < year + 5);
        yearBins.push({ year: year + 2, count });
      }

      const validPairs = records
        .filter((row) => isFiniteNumber(row.objectYear) && isFiniteNumber(row.eventYear))
        .map((row) => ({
          title: row.title,
          objectName: row.objectName,
          objectYear: row.objectYear,
          eventYear: row.eventYear,
          gap: Math.abs(row.objectYear - row.eventYear)
        }))
        .sort((a, b) => a.objectYear - b.objectYear);

      const gaps = validPairs.map((pair) => pair.gap).sort((a, b) => a - b);
      const gapMetrics = {
        validPairs: validPairs.length,
        within1: countWhere(gaps, (gap) => gap <= 1) / validPairs.length,
        within5: countWhere(gaps, (gap) => gap <= 5) / validPairs.length,
        within25: countWhere(gaps, (gap) => gap <= 25) / validPairs.length,
        medianGap: median(gaps)
      };

      const transitMetrics = {};
      TRANSIT_GROUPS.forEach((group) => {
        transitMetrics[group.key] = {
          plusMinus1: shareNearYears(objectYears, group.years, 1),
          plusMinus3: shareNearYears(objectYears, group.years, 3),
          plusMinus5: shareNearYears(objectYears, group.years, 5)
        };
      });

      return {
        totalRows: records.length,
        objectYears,
        objectRange,
        incidentRange,
        centuries,
        pre1900Share,
        topCountries,
        topFiveShare,
        countryCount,
        cityMetrics: {
          parisCount: cityMap.get("Paris") || 0,
          unknownCount: cityMap.get("Unknown city") || 0
        },
        topDecades,
        yearBins,
        validPairs,
        gapMetrics,
        transitMetrics
      };
    }

    function parseCSV(text) {
      const rows = [];
      let current = "";
      let row = [];
      let insideQuotes = false;

      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"') {
          if (insideQuotes && next === '"') {
            current += '"';
            i += 1;
          } else {
            insideQuotes = !insideQuotes;
          }
        } else if (char === "," && !insideQuotes) {
          row.push(current);
          current = "";
        } else if ((char === "\n" || char === "\r") && !insideQuotes) {
          if (char === "\r" && next === "\n") {
            i += 1;
          }
          row.push(current);
          if (row.some((cell) => cell.length > 0)) {
            rows.push(row);
          }
          row = [];
          current = "";
        } else {
          current += char;
        }
      }

      if (current.length || row.length) {
        row.push(current);
        rows.push(row);
      }

      const [header, ...dataRows] = rows;
      return dataRows.map((cells) => {
        const item = Object.fromEntries(header.map((key, index) => [key, (cells[index] || "").trim()]));
        return {
          title: item["Title"],
          objectName: item["Object.Name"],
          artist: item["Artist.Display.Name"],
          country: item["Country"],
          city: item["City"],
          eventName: item["Historical Incident"],
          eventType: item["Type of Event "],
          objectYear: parseNumber(item["Object.Begin.Date"]),
          eventYear: parseNumber(item["Year"])
        };
      });
    }

    function updateHeader(ui, content) {
      ui.kicker.textContent = content.kicker;
      ui.title.textContent = content.title;
      ui.description.textContent = content.description;
      ui.footnote.textContent = content.footnote;
    }

    function setLegend(node, items) {
      node.innerHTML = items.map((item) => `
        <span class="legend-pill">
          <span class="swatch" style="background:${item.color}"></span>
          ${escapeHTML(item.label)}
        </span>
      `).join("");
    }

    function tally(values) {
      const map = new Map();
      values.forEach((value) => {
        map.set(value, (map.get(value) || 0) + 1);
      });
      return map;
    }

    function mapToSortedArray(map, total) {
      return Array.from(map.entries())
        .map(([label, count]) => ({ label, count, share: count / total }))
        .sort((a, b) => b.count - a.count);
    }

    function shareNearYears(baseYears, referenceYears, threshold) {
      const matches = baseYears.filter((year) => referenceYears.some((reference) => Math.abs(reference - year) <= threshold));
      return matches.length / baseYears.length;
    }

    function scaleLinear(domainMin, domainMax, rangeMin, rangeMax) {
      const domainSpan = domainMax - domainMin || 1;
      const rangeSpan = rangeMax - rangeMin;
      return (value) => rangeMin + ((value - domainMin) / domainSpan) * rangeSpan;
    }

    function median(values) {
      if (!values.length) return 0;
      const mid = Math.floor(values.length / 2);
      return values.length % 2 ? values[mid] : (values[mid - 1] + values[mid]) / 2;
    }

    function countWhere(values, predicate) {
      return values.reduce((total, value) => total + (predicate(value) ? 1 : 0), 0);
    }

    function formatPercent(value) {
      return `${(value * 100).toFixed(2)}%`;
    }

    function parseNumber(value) {
      const result = Number.parseInt(value, 10);
      return Number.isFinite(result) ? result : null;
    }

    function isFiniteNumber(value) {
      return Number.isFinite(value);
    }

    function cleanLabel(value) {
      return value && value.trim() ? value.trim() : "";
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function clearSVG(svg) {
      svg.innerHTML = "";
    }

    function appendCircle(svg, cx, cy, r, fill, opacity = 1) {
      const node = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      node.setAttribute("cx", cx);
      node.setAttribute("cy", cy);
      node.setAttribute("r", r);
      node.setAttribute("fill", fill);
      node.setAttribute("opacity", opacity);
      svg.appendChild(node);
      return node;
    }

    function appendLine(svg, x1, y1, x2, y2, stroke, width, opacity = 1) {
      const node = document.createElementNS("http://www.w3.org/2000/svg", "line");
      node.setAttribute("x1", x1);
      node.setAttribute("y1", y1);
      node.setAttribute("x2", x2);
      node.setAttribute("y2", y2);
      node.setAttribute("stroke", stroke);
      node.setAttribute("stroke-width", width);
      node.setAttribute("opacity", opacity);
      svg.appendChild(node);
      return node;
    }

    function appendText(svg, x, y, text, anchor, fill, size, weight, rotate = 0) {
      const node = document.createElementNS("http://www.w3.org/2000/svg", "text");
      node.setAttribute("x", x);
      node.setAttribute("y", y);
      node.setAttribute("text-anchor", anchor);
      node.setAttribute("fill", fill);
      node.setAttribute("font-size", size);
      node.setAttribute("font-weight", weight);
      if (rotate) {
        node.setAttribute("transform", `rotate(${rotate} ${x} ${y})`);
      }
      node.textContent = text;
      svg.appendChild(node);
      return node;
    }

    function appendPath(svg, d, fill, stroke, width, opacity = 1) {
      const node = document.createElementNS("http://www.w3.org/2000/svg", "path");
      node.setAttribute("d", d);
      node.setAttribute("fill", fill);
      node.setAttribute("stroke", stroke);
      node.setAttribute("stroke-width", width);
      node.setAttribute("opacity", opacity);
      node.setAttribute("stroke-linecap", "round");
      node.setAttribute("stroke-linejoin", "round");
      svg.appendChild(node);
      return node;
    }

    function appendRect(svg, x, y, width, height, fill, stroke, radius = 18) {
      const node = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      node.setAttribute("x", x);
      node.setAttribute("y", y);
      node.setAttribute("width", width);
      node.setAttribute("height", height);
      node.setAttribute("rx", radius);
      node.setAttribute("fill", fill);
      node.setAttribute("stroke", stroke);
      svg.appendChild(node);
      return node;
    }

    function showTooltip(node, html) {
      node.innerHTML = html;
      node.classList.add("visible");
    }

    function hideTooltip(node) {
      node.classList.remove("visible");
    }
  </script>
</body>
